<!doctypehtml>
  <meta charset=UTF-8>
  <meta content="width=device-width,initial-scale=1" name=viewport>
  <style>
    @font-face {
      font-family: osu_font;
      src: url(https://web.engr.oregonstate.edu/~christj/onid_bot/osu_font.otf) format("opentype")
    }

    * {
      font-family: osu_font, "Helvetica Neue", Helvetica, Arial, sans-serif
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #2f3136;
      color: #dcddde
    }

    a {
      color: inherit;
      text-decoration: none
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #36393f;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .3)
    }

    .header {
      background-color: #d73f09;
      padding: 30px;
      text-align: center
    }

    .header h1 {
      color: #fff;
      margin: 0;
      font-size: 24px;
      letter-spacing: 1px
    }

    .content {
      padding: 40px 30px;
      line-height: 1.6
    }

    .content-upper {
      font-size: 22px
    }

    .content-lower {
      font-size: 16px
    }

    .code-container {
      background-color: #2f3136;
      border: 1px solid #4f545c;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      margin: 30px 0
    }

    .verification-code {
      font-family: "Courier New", Courier, monospace;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 5px
    }

    .footer {
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: #72767d;
      background-color: #2f3136
    }
  </style>
  <div class=container>
    <div class=header>
      <h1>OnidBot Verification</h1>
    </div>
    <div class=content>
      <p class=content-upper>Your OnidBot verification code is:
      <div class=code-container><span class=verification-code>##CODE##</span></div>
      <p class=content-lower>This code will expire in 15 minutes. If you did not request this code, you can safely
        ignore this email.
    </div>
    <div class=footer>
      <p>Report abuse to <strong><a href="mailto:christj@oregonstate.edu?subject=OnidBot Abuse Report&body=Description of abusive behavior (e.g. email spam)...">christj@oregonstate.edu</a></strong>
      <p>Sent by <strong>OnidBot</strong>
    </div>
  </div>
